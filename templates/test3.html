<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TEST 3 - RTT</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#0f172a;color:#e2e8f0;font-family:'Segoe UI',system-ui,sans-serif;padding:20px 24px;overflow-y:auto;height:100vh}
        .card{background:#1a2332;border:1px solid #2d3a4a;border-radius:10px;overflow:hidden}
        .card-header{background:#151d2b;padding:10px 16px;font-weight:600;color:#f1f5f9;border-bottom:1px solid #2d3a4a;font-size:0.85rem;display:flex;align-items:center;gap:8px}
        .card-body{padding:16px 20px 24px 20px}
        .section-title{font-size:0.78rem;color:#38bdf8;font-weight:600;margin:0 0 10px 0;padding-left:10px;border-left:3px solid #38bdf8}
        
        .charts-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
        .chart-box{background:#151d2b;border:1px solid #2d3a4a;border-radius:8px;padding:12px}
        .chart-title{font-size:0.72rem;color:#38bdf8;margin-bottom:8px;font-weight:600}
        .chart-wrap{position:relative;height:260px}
        
        .table-wrapper{background:#151d2b;border:1px solid #2d3a4a;border-radius:8px;overflow:hidden;margin-top:16px}
        .table-scroll{overflow-x:auto}
        table{width:100%;border-collapse:collapse;font-size:0.62rem}
        th{background:#0f172a;color:#38bdf8;padding:6px 7px;text-align:center;font-weight:600;font-size:0.58rem;text-transform:uppercase;border-bottom:2px solid #2d3a4a;white-space:nowrap}
        td{padding:5px 7px;border-bottom:1px solid #1e293b;color:#cbd5e1;text-align:center;font-size:0.6rem}
        tr:hover td{background:rgba(56,189,248,0.03)}
        
        td.strat-name{font-weight:700;font-size:0.68rem;vertical-align:middle;text-align:center;border-right:2px solid #2d3a4a}
        td.strat-name-ds{color:#3b82f6;background:rgba(59,130,246,0.06)}
        td.strat-name-dl{color:#10b981;background:rgba(16,185,129,0.06)}
        td.strat-name-n64{color:#f59e0b;background:rgba(245,158,11,0.06)}
        
        tr.strat-separator td{border-top:3px solid #2d3a4a;background:#0f172a;padding:0;height:3px}
        
        tr.strat-avg td{border-top:2px solid #38bdf8;font-weight:700;color:#f1f5f9;font-size:0.64rem;background:rgba(56,189,248,0.05)}
        
        .badge{background:rgba(56,189,248,0.12);color:#38bdf8;padding:2px 7px;border-radius:3px;font-size:0.6rem;font-weight:500}
        .run-badge{font-size:0.5rem;padding:2px 6px;border-radius:3px;font-weight:600}
        .run-1{background:rgba(59,130,246,0.2);color:#3b82f6}
        .run-2{background:rgba(16,185,129,0.2);color:#10b981}
        .run-3{background:rgba(245,158,11,0.2);color:#f59e0b}
        .val-good{color:#10b981;font-weight:600}
        .val-warn{color:#f59e0b;font-weight:600}
        .val-bad{color:#ef4444;font-weight:600}
    </style>
</head>
<body>
<div class="card">
    <div class="card-header">🔴 TEST 4: RTT Consistency <span class="badge">PC1 • T3Rs.json • 100 Pings × 3 Runs</span></div>
    <div class="card-body">
        
        <div class="section-title">📊 Avg RTT Across Runs</div>
        <div class="charts-row">
            <div class="chart-box"><div class="chart-title">Avg RTT Comparison - Run 1, 2, 3</div><div class="chart-wrap"><canvas id="rttChart"></canvas></div></div>
            <div class="chart-box"><div class="chart-title">RTT Variation (Mdev) & Packet Loss</div><div class="chart-wrap"><canvas id="mdevChart"></canvas></div></div>
        </div>
        
        <div class="section-title">📋 Results Summary - Strategy × Runs</div>
        <div class="table-wrapper"><div class="table-scroll"><table>
            <thead><tr><th>Strategy</th><th>Run</th><th>Min RTT (ms)</th><th>Avg RTT (ms)</th><th>Max RTT (ms)</th><th>Mdev (ms)</th><th>Loss %</th></tr></thead>
            <tbody id="summary"></tbody>
        </table></div></div>
    </div>
</div>

<script>
let charts={};

async function load(){
    try{
        const r = await fetch('/api/test3-raw');
        const rawData = await r.json();
        if(rawData.error){document.body.innerHTML='<p style="color:#ef4444;padding:20px">❌ '+rawData.error+'</p>';return}
        
        console.log('Raw entries:', rawData.length);
        
        // Group data: grouped[strategy][run] = {min, avg, max, mdev, loss}
        const grouped = {};
        rawData.forEach(entry => {
            const s = entry.strategy;
            const run = entry.run || 1;
            const metric = entry.metric;
            const value = parseFloat(entry.value);
            
            if (!grouped[s]) grouped[s] = {};
            if (!grouped[s][run]) grouped[s][run] = {};
            
            if (metric.includes('Min_ms')) grouped[s][run].min = value;
            else if (metric.includes('Max_ms')) grouped[s][run].max = value;
            else if (metric.includes('Mdev_ms')) grouped[s][run].mdev = value;
            else if (metric.includes('Avg_ms')) grouped[s][run].avg = value;
            else if (metric.includes('Loss')) grouped[s][run].loss = value;
        });
        
        const strategies = ['dualstack', 'dslite', 'nat64'];
        const stratNames = ['Dual Stack', 'DS-Lite', 'NAT64'];
        const stratIcons = ['🔵', '🟢', '🟠'];
        const cols = ['#3b82f6', '#10b981', '#f59e0b'];
        const stratNameClasses = ['strat-name-ds', 'strat-name-dl', 'strat-name-n64'];
        const runIcons = ['🔵', '🟢', '🟠'];
        const runBadges = ['run-1', 'run-2', 'run-3'];
        
        // Find all runs
        const allRuns = new Set();
        strategies.forEach(s => {
            if (grouped[s]) Object.keys(grouped[s]).forEach(r => allRuns.add(parseInt(r)));
        });
        const runNumbers = Array.from(allRuns).sort();
        const rowsPerStrategy = runNumbers.length + 1; // +1 for average row
        
        // Chart 1
        if(charts['rttChart'])charts['rttChart'].destroy();
        charts['rttChart'] = new Chart(document.getElementById('rttChart'), {
            type: 'line',
            data: {
                labels: runNumbers.map(r => 'Run ' + r),
                datasets: strategies.map((s, i) => ({
                    label: stratNames[i],
                    data: runNumbers.map(r => grouped[s] && grouped[s][r] ? (grouped[s][r].avg || 0) : null),
                    borderColor: cols[i], backgroundColor: cols[i]+'20',
                    borderWidth: 2.5, tension: 0.3, fill: false, pointRadius: 5, pointHoverRadius: 7, spanGaps: true
                }))
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                plugins: { legend: { labels: { color: '#cbd5e1', font: { size: 10 }, padding: 12, usePointStyle: true } } },
                scales: {
                    y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.06)' }, title: { display: true, text: 'Avg RTT (ms)', color: '#94a3b8', font: { size: 9 } }, ticks: { color: '#94a3b8', font: { size: 8 } } },
                    x: { grid: { display: false }, ticks: { color: '#94a3b8', font: { size: 9 } } }
                }
            }
        });
        
        // Chart 2
        const avgMdev = strategies.map(s => {
            let sum=0, cnt=0;
            runNumbers.forEach(r => { if(grouped[s]&&grouped[s][r]&&grouped[s][r].mdev>0){sum+=grouped[s][r].mdev;cnt++;} });
            return cnt>0?sum/cnt:0;
        });
        const avgLoss = strategies.map(s => {
            let sum=0, cnt=0;
            runNumbers.forEach(r => { if(grouped[s]&&grouped[s][r]&&grouped[s][r].loss!==undefined){sum+=grouped[s][r].loss;cnt++;} });
            return cnt>0?sum/cnt:0;
        });
        
        if(charts['mdevChart'])charts['mdevChart'].destroy();
        charts['mdevChart'] = new Chart(document.getElementById('mdevChart'), {
            type: 'line',
            data: {
                labels: stratNames,
                datasets: [
                    { label: 'Mdev (ms)', data: avgMdev, borderColor: '#f59e0b', backgroundColor: 'rgba(245,158,11,0.1)', borderWidth: 2.5, tension: 0.3, fill: true, pointRadius: 5, yAxisID: 'y' },
                    { label: 'Packet Loss (%)', data: avgLoss, borderColor: '#ef4444', backgroundColor: 'rgba(239,68,68,0.1)', borderWidth: 2.5, tension: 0.3, fill: true, pointRadius: 5, borderDash: [5, 3], yAxisID: 'y1' }
                ]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                plugins: { legend: { labels: { color: '#cbd5e1', font: { size: 10 }, padding: 12, usePointStyle: true } } },
                scales: {
                    y: { type: 'linear', position: 'left', beginAtZero: true, grid: { color: 'rgba(255,255,255,0.06)' }, title: { display: true, text: 'Mdev (ms)', color: '#f59e0b', font: { size: 9 } }, ticks: { color: '#f59e0b', font: { size: 8 } } },
                    y1: { type: 'linear', position: 'right', beginAtZero: true, max: 100, grid: { display: false }, title: { display: true, text: 'Loss (%)', color: '#ef4444', font: { size: 9 } }, ticks: { color: '#ef4444', font: { size: 8 } } },
                    x: { grid: { display: false }, ticks: { color: '#94a3b8', font: { size: 9 } } }
                }
            }
        });
        
        // TABLE with rowspan for strategy name
        let h = '';
        strategies.forEach((s, si) => {
            let stratMinTotal=0, stratAvgTotal=0, stratMaxTotal=0, stratMdevTotal=0, stratLossTotal=0;
            let count=0;
            let firstRow = true;
            
            runNumbers.forEach(run => {
                const d = grouped[s] && grouped[s][run] ? grouped[s][run] : {};
                if (Object.keys(d).length === 0) return;
                
                h += `<tr>`;
                
                // Strategy name in first row only (rowspan)
                if (firstRow) {
                    h += `<td class="strat-name ${stratNameClasses[si]}" rowspan="${rowsPerStrategy}">${stratIcons[si]}<br>${stratNames[s]}</td>`;
                    firstRow = false;
                }
                
                h += `<td><span class="run-badge ${runBadges[run-1]||''}">${runIcons[run-1]||'📊'} Run ${run}</span></td>
                    <td class="${d.min>0?(d.min<2?'val-good':d.min<10?'val-warn':'val-bad'):''}">${d.min>0?d.min.toFixed(3):'—'}</td>
                    <td class="${d.avg>0?(d.avg<5?'val-good':d.avg<20?'val-warn':'val-bad'):''}">${d.avg>0?d.avg.toFixed(3):'—'}</td>
                    <td class="${d.max>0?(d.max<10?'val-good':d.max<50?'val-warn':'val-bad'):''}">${d.max>0?d.max.toFixed(3):'—'}</td>
                    <td class="${d.mdev>0?(d.mdev<1?'val-good':d.mdev<5?'val-warn':'val-bad'):''}">${d.mdev>0?d.mdev.toFixed(3):'—'}</td>
                    <td class="${d.loss===0?'val-good':d.loss<5?'val-warn':'val-bad'}">${d.loss!==undefined?d.loss.toFixed(1)+'%':'—'}</td>
                </tr>`;
                
                if(d.min>0){stratMinTotal+=d.min;stratAvgTotal+=d.avg;stratMaxTotal+=d.max;stratMdevTotal+=d.mdev;stratLossTotal+=d.loss||0;count++;}
            });
            
            // Strategy average row
            if(count > 0) {
                h += `<tr class="strat-avg">
                    <td>📊 Average</td>
                    <td class="val-neutral">${(stratMinTotal/count).toFixed(3)}</td>
                    <td class="val-neutral">${(stratAvgTotal/count).toFixed(3)}</td>
                    <td class="val-neutral">${(stratMaxTotal/count).toFixed(3)}</td>
                    <td class="val-neutral">${(stratMdevTotal/count).toFixed(3)}</td>
                    <td class="val-neutral">${(stratLossTotal/count).toFixed(1)}%</td>
                </tr>`;
            }
            
            // Separator between strategies
            if (si < strategies.length - 1) {
                h += `<tr class="strat-separator"><td colspan="7"></td></tr>`;
            }
        });
        
        document.getElementById('summary').innerHTML = h;
        
    } catch(e) {
        document.body.innerHTML = '<p style="color:#ef4444;padding:20px">❌ Error: ' + e.message + '</p>';
        console.error(e);
    }
}
load();
</script>
</body>
</html>
