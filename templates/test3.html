<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TEST 3 - RTT</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#0f172a;color:#e2e8f0;font-family:'Segoe UI',system-ui,sans-serif;padding:20px 24px;overflow-y:auto;height:100vh}
        .card{background:#1a2332;border:1px solid #2d3a4a;border-radius:10px;overflow:hidden}
        .card-header{background:#151d2b;padding:10px 16px;font-weight:600;color:#f1f5f9;border-bottom:1px solid #2d3a4a;font-size:0.85rem;display:flex;align-items:center;gap:8px}
        .card-body{padding:16px 20px 24px 20px}
        .section-title{font-size:0.78rem;color:#38bdf8;font-weight:600;margin:0 0 10px 0;padding-left:10px;border-left:3px solid #38bdf8}
        
        .charts-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
        .chart-box{background:#151d2b;border:1px solid #2d3a4a;border-radius:8px;padding:12px}
        .chart-title{font-size:0.72rem;color:#38bdf8;margin-bottom:8px;font-weight:600}
        .chart-wrap{position:relative;height:260px}
        
        .table-wrapper{background:#151d2b;border:1px solid #2d3a4a;border-radius:8px;overflow:hidden;margin-top:16px}
        table{width:100%;border-collapse:collapse;font-size:0.7rem}
        th{background:#0f172a;color:#38bdf8;padding:8px 10px;text-align:left;font-weight:600;font-size:0.65rem;text-transform:uppercase;border-bottom:2px solid #2d3a4a}
        td{padding:7px 10px;border-bottom:1px solid #1e293b;color:#cbd5e1}
        tr:hover td{background:rgba(56,189,248,0.03)}
        .badge{background:rgba(56,189,248,0.12);color:#38bdf8;padding:2px 7px;border-radius:3px;font-size:0.6rem;font-weight:500}
        .val-good{color:#10b981;font-weight:600}
        .val-warn{color:#f59e0b;font-weight:600}
        .val-bad{color:#ef4444;font-weight:600}
        .highlight{color:#f1f5f9;font-weight:600}
        .strat-ds{color:#3b82f6;font-weight:700}
        .strat-dl{color:#10b981;font-weight:700}
        .strat-n64{color:#f59e0b;font-weight:700}
    </style>
</head>
<body>
<div class="card">
    <div class="card-header">🔴 TEST 4: RTT Consistency <span class="badge">PC1 • T3Rs.json • 100 Pings</span></div>
    <div class="card-body">
        
        <div class="section-title">📊 RTT Metrics by Strategy</div>
        <div class="charts-row">
            <div class="chart-box">
                <div class="chart-title">RTT Min / Avg / Max Comparison</div>
                <div class="chart-wrap"><canvas id="rttChart"></canvas></div>
            </div>
            <div class="chart-box">
                <div class="chart-title">RTT Variation (Mdev) & Packet Loss</div>
                <div class="chart-wrap"><canvas id="mdevChart"></canvas></div>
            </div>
        </div>
        
        <div class="section-title">📋 Results Summary</div>
        <div class="table-wrapper">
            <table>
                <thead><tr><th>Strategy</th><th>Min RTT</th><th>Avg RTT</th><th>Max RTT</th><th>Mdev</th><th>Loss %</th></tr></thead>
                <tbody id="summary"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
let charts={};

function gv(data, metricKey, strategy, def=0){
    // Try known prefixes
    const prefixes = ['T4_RTT_PC1_', 'T3_RTT_PC1_'];
    for (const prefix of prefixes) {
        const fullKey = prefix + metricKey;
        if (data[fullKey] && data[fullKey][strategy] !== undefined && data[fullKey][strategy] !== null) {
            return parseFloat(data[fullKey][strategy]);
        }
    }
    // Fallback: search all keys for matching pattern
    for (const key of Object.keys(data)) {
        if (key.includes(metricKey) && data[key] && data[key][strategy] !== undefined) {
            return parseFloat(data[key][strategy]);
        }
    }
    return def;
}

function valClass(v, good, bad){
    if(v===0||isNaN(v))return'';
    if(v<=good)return'val-good';
    if(v>=bad)return'val-bad';
    return'val-warn';
}

async function load(){
    try{
        const r = await fetch('/api/test3');
        const d = await r.json();
        if(d.error){document.body.innerHTML='<p style="color:#ef4444;padding:20px;text-align:center">❌ No data available</p>';return}
        
        console.log('API Response keys:', Object.keys(d));
        
        const strategies = ['dualstack', 'dslite', 'nat64'];
        const names = ['Dual Stack', 'DS-Lite', 'NAT64'];
        const cols = ['#3b82f6', '#10b981', '#f59e0b'];
        const stratClasses = ['strat-ds', 'strat-dl', 'strat-n64'];
        
        // Get values for each strategy
        const data = strategies.map((s, i) => ({
            strategy: s,
            name: names[i],
            color: cols[i],
            cls: stratClasses[i],
            min: gv(d, 'Min_ms', s),
            avg: gv(d, 'Avg_ms', s),
            max: gv(d, 'Max_ms', s),
            mdev: gv(d, 'Mdev_ms', s),
            loss: gv(d, 'Loss_Percent', s)
        }));
        
        console.log('Parsed data:', data);
        
        // RTT Line Chart - Min/Avg/Max
        if(charts['rttChart'])charts['rttChart'].destroy();
        charts['rttChart'] = new Chart(document.getElementById('rttChart'), {
            type: 'line',
            data: {
                labels: ['Min RTT', 'Avg RTT', 'Max RTT'],
                datasets: data.map(d => ({
                    label: d.name,
                    data: [d.min, d.avg, d.max],
                    borderColor: d.color,
                    backgroundColor: d.color + '20',
                    borderWidth: 2.5,
                    tension: 0.3,
                    fill: false,
                    pointRadius: 5,
                    pointHoverRadius: 7,
                    pointBackgroundColor: d.color
                }))
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: {
                        labels: {
                            color: '#cbd5e1',
                            font: { size: 10 },
                            padding: 12,
                            usePointStyle: true,
                            pointStyleWidth: 8
                        }
                    }
                },
                scales: {
                    y: {
                        beginAtZero: true,
                        grid: { color: 'rgba(255,255,255,0.06)' },
                        title: { display: true, text: 'RTT (ms)', color: '#94a3b8', font: { size: 9 } },
                        ticks: { color: '#94a3b8', font: { size: 8 } }
                    },
                    x: {
                        grid: { display: false },
                        ticks: { color: '#94a3b8', font: { size: 9 } }
                    }
                }
            }
        });
        
        // Mdev & Loss Dual-Axis Chart
        if(charts['mdevChart'])charts['mdevChart'].destroy();
        charts['mdevChart'] = new Chart(document.getElementById('mdevChart'), {
            type: 'line',
            data: {
                labels: data.map(d => d.name),
                datasets: [
                    {
                        label: 'Mdev (ms)',
                        data: data.map(d => d.mdev),
                        borderColor: '#f59e0b',
                        backgroundColor: 'rgba(245,158,11,0.1)',
                        borderWidth: 2.5,
                        tension: 0.3,
                        fill: true,
                        pointRadius: 5,
                        pointHoverRadius: 7,
                        pointBackgroundColor: '#f59e0b',
                        yAxisID: 'y'
                    },
                    {
                        label: 'Packet Loss (%)',
                        data: data.map(d => d.loss),
                        borderColor: '#ef4444',
                        backgroundColor: 'rgba(239,68,68,0.1)',
                        borderWidth: 2.5,
                        tension: 0.3,
                        fill: true,
                        pointRadius: 5,
                        pointHoverRadius: 7,
                        pointBackgroundColor: '#ef4444',
                        borderDash: [5, 3],
                        yAxisID: 'y1'
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: {
                        labels: {
                            color: '#cbd5e1',
                            font: { size: 10 },
                            padding: 12,
                            usePointStyle: true
                        }
                    }
                },
                scales: {
                    y: {
                        type: 'linear',
                        position: 'left',
                        beginAtZero: true,
                        grid: { color: 'rgba(255,255,255,0.06)' },
                        title: { display: true, text: 'Mdev (ms)', color: '#f59e0b', font: { size: 9 } },
                        ticks: { color: '#f59e0b', font: { size: 8 } }
                    },
                    y1: {
                        type: 'linear',
                        position: 'right',
                        beginAtZero: true,
                        max: 100,
                        grid: { display: false },
                        title: { display: true, text: 'Loss (%)', color: '#ef4444', font: { size: 9 } },
                        ticks: { color: '#ef4444', font: { size: 8 } }
                    },
                    x: {
                        grid: { display: false },
                        ticks: { color: '#94a3b8', font: { size: 9 } }
                    }
                }
            }
        });
        
        // Summary Table
        let h = '';
        data.forEach(d => {
            h += `<tr>
                <td class="${d.cls}"><strong>${d.name}</strong></td>
                <td class="${valClass(d.min, 2, 10)}">${d.min > 0 ? d.min.toFixed(3) + ' ms' : '—'}</td>
                <td class="${valClass(d.avg, 5, 20)}">${d.avg > 0 ? d.avg.toFixed(3) + ' ms' : '—'}</td>
                <td class="${valClass(d.max, 10, 50)}">${d.max > 0 ? d.max.toFixed(3) + ' ms' : '—'}</td>
                <td class="${valClass(d.mdev, 1, 5)}">${d.mdev > 0 ? d.mdev.toFixed(3) + ' ms' : '—'}</td>
                <td class="${d.loss === 0 ? 'val-good' : d.loss < 5 ? 'val-warn' : 'val-bad'}">${d.loss.toFixed(1)}%</td>
            </tr>`;
        });
        document.getElementById('summary').innerHTML = h;
        
    } catch(e) {
        document.body.innerHTML = '<p style="color:#ef4444;padding:20px;text-align:center">❌ Error loading data: ' + e.message + '</p>';
        console.error(e);
    }
}
load();
</script>
</body>
</html>
