<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TEST 3 - RTT</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#0f172a;color:#e2e8f0;font-family:'Segoe UI',system-ui,sans-serif;padding:20px 24px;overflow-y:auto;height:100vh}
        .card{background:#1a2332;border:1px solid #2d3a4a;border-radius:10px;overflow:hidden}
        .card-header{background:#151d2b;padding:10px 16px;font-weight:600;color:#f1f5f9;border-bottom:1px solid #2d3a4a;font-size:0.85rem;display:flex;align-items:center;gap:8px}
        .card-body{padding:16px 20px 24px 20px}
        .section-title{font-size:0.78rem;color:#38bdf8;font-weight:600;margin:0 0 10px 0;padding-left:10px;border-left:3px solid #38bdf8}
        
        .charts-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
        .chart-box{background:#151d2b;border:1px solid #2d3a4a;border-radius:8px;padding:12px}
        .chart-title{font-size:0.72rem;color:#38bdf8;margin-bottom:8px;font-weight:600}
        .chart-wrap{position:relative;height:260px}
        
        .table-wrapper{background:#151d2b;border:1px solid #2d3a4a;border-radius:8px;overflow:hidden;margin-top:16px}
        table{width:100%;border-collapse:collapse;font-size:0.7rem}
        th{background:#0f172a;color:#38bdf8;padding:8px 10px;text-align:left;font-weight:600;font-size:0.65rem;text-transform:uppercase;border-bottom:2px solid #2d3a4a}
        td{padding:7px 10px;border-bottom:1px solid #1e293b;color:#cbd5e1}
        tr:hover td{background:rgba(56,189,248,0.03)}
        .badge{background:rgba(56,189,248,0.12);color:#38bdf8;padding:2px 7px;border-radius:3px;font-size:0.6rem;font-weight:500}
        .val-good{color:#10b981;font-weight:600}
        .val-warn{color:#f59e0b;font-weight:600}
        .val-bad{color:#ef4444;font-weight:600}
        .highlight{color:#f1f5f9;font-weight:600}
    </style>
</head>
<body>
<div class="card">
    <div class="card-header">🔴 TEST 3: RTT Consistency <span class="badge">PC1 • T3Rs.json • 100 Pings</span></div>
    <div class="card-body">
        
        <div class="section-title">📊 RTT Metrics by Strategy</div>
        <div class="charts-row">
            <div class="chart-box">
                <div class="chart-title">RTT Min / Avg / Max Comparison</div>
                <div class="chart-wrap"><canvas id="rttChart"></canvas></div>
            </div>
            <div class="chart-box">
                <div class="chart-title">RTT Variation (Mdev) & Packet Loss</div>
                <div class="chart-wrap"><canvas id="mdevChart"></canvas></div>
            </div>
        </div>
        
        <div class="section-title">📋 Results Summary</div>
        <div class="table-wrapper">
            <table>
                <thead><tr><th>Metric</th><th>Dual Stack</th><th>DS-Lite</th><th>NAT64</th></tr></thead>
                <tbody id="summary"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
let charts={};
function gv(d,m,s,def=0){return(d&&d[m]&&d[m][s]!==undefined)?parseFloat(d[m][s]):def}

function valClass(v,good,bad){
    if(v===0||isNaN(v))return'';
    if(v<=good)return'val-good';
    if(v>=bad)return'val-bad';
    return'val-warn';
}

async function load(){
    try{
        const r=await fetch('/api/test3');const d=await r.json();
        if(d.error){document.body.innerHTML='<p style="color:#ef4444;padding:20px;text-align:center">❌ No data available</p>';return}
        
        const names=['Dual Stack','DS-Lite','NAT64'];
        const cols=['#3b82f6','#10b981','#f59e0b'];
        const strats=['dualstack','dslite','nat64'];
        const metrics=['Min','Avg','Max','Mdev'];
        const metricLabels={Min:'Min RTT',Avg:'Avg RTT',Max:'Max RTT',Mdev:'Mdev (Jitter)'};
        const thresholds={Min:[2,10],Avg:[5,20],Max:[10,50],Mdev:[1,5]};
        
        // RTT Line Chart - Min/Avg/Max
        if(charts['rttChart'])charts['rttChart'].destroy();
        charts['rttChart']=new Chart(document.getElementById('rttChart'),{
            type:'line',
            data:{
                labels:['Min RTT','Avg RTT','Max RTT'],
                datasets:strats.map((s,i)=>({
                    label:names[i],
                    data:[
                        gv(d,'T3_RTT_PC1_Min_ms',s),
                        gv(d,'T3_RTT_PC1_Avg_ms',s),
                        gv(d,'T3_RTT_PC1_Max_ms',s)
                    ],
                    borderColor:cols[i],
                    backgroundColor:cols[i]+'20',
                    borderWidth:2.5,
                    tension:0.3,
                    fill:false,
                    pointRadius:5,
                    pointHoverRadius:7,
                    pointBackgroundColor:cols[i]
                }))
            },
            options:{
                responsive:true,maintainAspectRatio:false,
                plugins:{legend:{labels:{color:'#cbd5e1',font:{size:10},padding:12,usePointStyle:true,pointStyleWidth:8}}},
                scales:{
                    y:{beginAtZero:true,grid:{color:'rgba(255,255,255,0.06)'},title:{display:true,text:'RTT (ms)',color:'#94a3b8',font:{size:9}},ticks:{color:'#94a3b8',font:{size:8}}},
                    x:{grid:{display:false},ticks:{color:'#94a3b8',font:{size:9}}}
                }
            }
        });
        
        // Mdev & Loss Chart
        if(charts['mdevChart'])charts['mdevChart'].destroy();
        charts['mdevChart']=new Chart(document.getElementById('mdevChart'),{
            type:'line',
            data:{
                labels:names,
                datasets:[{
                    label:'Mdev (ms)',
                    data:strats.map(s=>gv(d,'T3_RTT_PC1_Mdev_ms',s)),
                    borderColor:'#f59e0b',
                    backgroundColor:'rgba(245,158,11,0.1)',
                    borderWidth:2.5,
                    tension:0.3,
                    fill:true,
                    pointRadius:5,
                    pointHoverRadius:7,
                    pointBackgroundColor:'#f59e0b',
                    yAxisID:'y'
                },{
                    label:'Packet Loss (%)',
                    data:strats.map(s=>gv(d,'T3_RTT_PC1_Loss_Percent',s)),
                    borderColor:'#ef4444',
                    backgroundColor:'rgba(239,68,68,0.1)',
                    borderWidth:2.5,
                    tension:0.3,
                    fill:true,
                    pointRadius:5,
                    pointHoverRadius:7,
                    pointBackgroundColor:'#ef4444',
                    borderDash:[5,3],
                    yAxisID:'y1'
                }]
            },
            options:{
                responsive:true,maintainAspectRatio:false,
                plugins:{legend:{labels:{color:'#cbd5e1',font:{size:10},padding:12,usePointStyle:true,pointStyleWidth:8}}},
                scales:{
                    y:{type:'linear',position:'left',beginAtZero:true,grid:{color:'rgba(255,255,255,0.06)'},title:{display:true,text:'Mdev (ms)',color:'#f59e0b',font:{size:9}},ticks:{color:'#f59e0b',font:{size:8}}},
                    y1:{type:'linear',position:'right',beginAtZero:true,max:100,grid:{display:false},title:{display:true,text:'Loss (%)',color:'#ef4444',font:{size:9}},ticks:{color:'#ef4444',font:{size:8}}},
                    x:{grid:{display:false},ticks:{color:'#94a3b8',font:{size:9}}}
                }
            }
        });
        
        // Summary Table
        document.getElementById('summary').innerHTML=`
            <tr><td><strong>Min RTT</strong></td>
                <td class="${valClass(gv(d,'T3_RTT_PC1_Min_ms','dualstack'),2,10)}">${gv(d,'T3_RTT_PC1_Min_ms','dualstack').toFixed(3)} ms</td>
                <td class="${valClass(gv(d,'T3_RTT_PC1_Min_ms','dslite'),2,10)}">${gv(d,'T3_RTT_PC1_Min_ms','dslite').toFixed(3)} ms</td>
                <td class="${valClass(gv(d,'T3_RTT_PC1_Min_ms','nat64'),2,10)}">${gv(d,'T3_RTT_PC1_Min_ms','nat64').toFixed(3)} ms</td></tr>
            <tr><td><strong>Avg RTT</strong></td>
                <td class="${valClass(gv(d,'T3_RTT_PC1_Avg_ms','dualstack'),5,20)}">${gv(d,'T3_RTT_PC1_Avg_ms','dualstack').toFixed(3)} ms</td>
                <td class="${valClass(gv(d,'T3_RTT_PC1_Avg_ms','dslite'),5,20)}">${gv(d,'T3_RTT_PC1_Avg_ms','dslite').toFixed(3)} ms</td>
                <td class="${valClass(gv(d,'T3_RTT_PC1_Avg_ms','nat64'),5,20)}">${gv(d,'T3_RTT_PC1_Avg_ms','nat64').toFixed(3)} ms</td></tr>
            <tr><td><strong>Max RTT</strong></td>
                <td class="${valClass(gv(d,'T3_RTT_PC1_Max_ms','dualstack'),10,50)}">${gv(d,'T3_RTT_PC1_Max_ms','dualstack').toFixed(3)} ms</td>
                <td class="${valClass(gv(d,'T3_RTT_PC1_Max_ms','dslite'),10,50)}">${gv(d,'T3_RTT_PC1_Max_ms','dslite').toFixed(3)} ms</td>
                <td class="${valClass(gv(d,'T3_RTT_PC1_Max_ms','nat64'),10,50)}">${gv(d,'T3_RTT_PC1_Max_ms','nat64').toFixed(3)} ms</td></tr>
            <tr><td><strong>Mdev (Jitter)</strong></td>
                <td class="${valClass(gv(d,'T3_RTT_PC1_Mdev_ms','dualstack'),1,5)}">${gv(d,'T3_RTT_PC1_Mdev_ms','dualstack').toFixed(3)} ms</td>
                <td class="${valClass(gv(d,'T3_RTT_PC1_Mdev_ms','dslite'),1,5)}">${gv(d,'T3_RTT_PC1_Mdev_ms','dslite').toFixed(3)} ms</td>
                <td class="${valClass(gv(d,'T3_RTT_PC1_Mdev_ms','nat64'),1,5)}">${gv(d,'T3_RTT_PC1_Mdev_ms','nat64').toFixed(3)} ms</td></tr>
            <tr style="border-top:2px solid #2d3a4a"><td><strong>Packet Loss</strong></td>
                <td class="${gv(d,'T3_RTT_PC1_Loss_Percent','dualstack')===0?'val-good':'val-bad'}">${gv(d,'T3_RTT_PC1_Loss_Percent','dualstack').toFixed(1)}%</td>
                <td class="${gv(d,'T3_RTT_PC1_Loss_Percent','dslite')===0?'val-good':'val-bad'}">${gv(d,'T3_RTT_PC1_Loss_Percent','dslite').toFixed(1)}%</td>
                <td class="${gv(d,'T3_RTT_PC1_Loss_Percent','nat64')===0?'val-good':'val-bad'}">${gv(d,'T3_RTT_PC1_Loss_Percent','nat64').toFixed(1)}%</td></tr>`;
        
    }catch(e){document.body.innerHTML='<p style="color:#ef4444;padding:20px;text-align:center">❌ Error loading data</p>';console.error(e);}
}
load();
</script>
</body>
</html>
