<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RTT Latency Consistency</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        *,*::before,*::after{box-sizing:border-box}
        
        body{
            background:#0f172a;
            color:#e2e8f0;
            font-family:"Inter","Segoe UI",system-ui,-apple-system,sans-serif;
            font-size:0.875rem;
            overflow-y:auto;
            height:100vh;
            -webkit-font-smoothing:antialiased;
        }
        
        .container{
            max-width:1200px;
            margin:0 auto;
            padding:20px 24px 32px;
        }
        
        .card{
            background:#1a2332;
            border:1px solid #2d3a4a;
            border-radius:12px;
            overflow:hidden;
            margin-bottom:20px;
        }
        .card-header{
            background:#151d2b;
            padding:14px 20px;
            font-weight:600;
            color:#f1f5f9;
            border-bottom:1px solid #2d3a4a;
            font-size:0.9375rem;
            display:flex;
            align-items:center;
            gap:10px;
            letter-spacing:-0.005em;
        }
        .card-body{padding:18px 22px 24px}
        
        .section-title{
            font-size:0.875rem;
            color:#38bdf8;
            font-weight:600;
            margin:0 0 12px 0;
            padding-left:12px;
            border-left:3px solid #38bdf8;
        }
        
        .charts-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:18px}
        .chart-box{
            background:#151d2b;
            border:1px solid #2d3a4a;
            border-radius:10px;
            padding:14px;
        }
        .chart-title{font-size:0.8125rem;color:#38bdf8;margin-bottom:8px;font-weight:600}
        .chart-wrap{position:relative;height:280px}
        
        .table-wrapper{
            background:#151d2b;
            border:1px solid #2d3a4a;
            border-radius:8px;
            overflow:hidden;
            margin-top:16px;
        }
        .table-scroll{overflow-x:auto}
        table{width:100%;border-collapse:collapse;font-size:0.75rem}
        th{
            background:#0f172a;
            color:#38bdf8;
            padding:7px 10px;
            text-align:center;
            font-weight:600;
            font-size:0.6875rem;
            text-transform:uppercase;
            border-bottom:2px solid #2d3a4a;
            white-space:nowrap;
            letter-spacing:0.02em;
        }
        td{padding:6px 10px;border-bottom:1px solid #1e293b;color:#cbd5e1;text-align:center;font-size:0.75rem}
        tr:hover td{background:rgba(56,189,248,0.03)}
        
        td.strat-name{
            font-weight:700;
            font-size:0.8125rem;
            vertical-align:middle;
            text-align:center;
            border-right:2px solid #2d3a4a;
            width:90px;
        }
        td.strat-name-ds{color:#3b82f6;background:rgba(59,130,246,0.06)}
        td.strat-name-dl{color:#10b981;background:rgba(16,185,129,0.06)}
        td.strat-name-n64{color:#f59e0b;background:rgba(245,158,11,0.06)}
        
        tr.run-header td{
            background:#0f172a;
            border-top:2px solid #2d3a4a;
            font-weight:700;
            color:#38bdf8;
            font-size:0.75rem;
            padding:8px;
        }
        tr.strat-separator td{border-top:3px solid #2d3a4a;background:#0f172a;padding:0;height:3px}
        tr.strat-avg td{
            border-top:2px solid #38bdf8;
            font-weight:700;
            color:#f1f5f9;
            font-size:0.8125rem;
            background:rgba(56,189,248,0.05);
        }
        
        .badge{
            background:rgba(56,189,248,0.12);
            color:#38bdf8;
            padding:3px 10px;
            border-radius:4px;
            font-size:0.6875rem;
            font-weight:500;
        }
        .run-badge{
            font-size:0.625rem;
            padding:4px 10px;
            border-radius:4px;
            font-weight:700;
        }
        .run-1{background:rgba(59,130,246,0.2);color:#3b82f6}
        .run-2{background:rgba(16,185,129,0.2);color:#10b981}
        .run-3{background:rgba(245,158,11,0.2);color:#f59e0b}
        .val-good{color:#10b981;font-weight:600}
        .val-warn{color:#f59e0b;font-weight:600}
        .val-bad{color:#ef4444;font-weight:600}
        .val-neutral{color:#38bdf8;font-weight:600}
        
        .legend-bar{
            display:flex;
            gap:16px;
            margin-bottom:14px;
            font-size:0.6875rem;
            color:#64748b;
            align-items:center;
            flex-wrap:wrap;
        }
        
        @media(max-width:900px){
            .charts-row{grid-template-columns:1fr}
        }
    </style>
</head>
<body>

<div class="container">
<div class="card">
    <div class="card-header">RTT Latency Consistency <span class="badge">PC1 | T3Rs.json | 100 Pings x 3 Runs</span></div>
    <div class="card-body">
        <div class="legend-bar">
            <span style="color:#10b981">Excellent</span>
            <span style="color:#f59e0b">Good</span>
            <span style="color:#ef4444">High</span>
            <span>|</span>
            <span title="Mean Deviation - measures jitter/stability. Lower = more stable">Mdev = Jitter (Standard Deviation of RTT)</span>
        </div>
        
        <div class="section-title">RTT Metrics by Strategy</div>
        <div class="charts-row">
            <div class="chart-box">
                <div class="chart-title">RTT Min / Avg / Max Comparison</div>
                <div class="chart-wrap"><canvas id="rttChart"></canvas></div>
            </div>
            <div class="chart-box">
                <div class="chart-title">RTT Variation (Mdev) &amp; Packet Loss</div>
                <div class="chart-wrap"><canvas id="mdevChart"></canvas></div>
            </div>
        </div>
        
        <div class="section-title">Results Summary</div>
        <div class="table-wrapper"><div class="table-scroll"><table>
            <thead><tr><th>Strategy</th><th>Run</th><th title="Minimum Round Trip Time - fastest ping">Min RTT (ms)</th><th title="Average Round Trip Time - typical latency">Avg RTT (ms)</th><th title="Maximum Round Trip Time - worst-case">Max RTT (ms)</th><th title="Mean Deviation - measures jitter. Lower = more stable">Mdev (ms)</th><th title="Percentage of packets lost. 0% is perfect">Loss %</th></tr></thead>
            <tbody id="summary"></tbody>
        </table></div></div>
    </div>
</div>
</div>

<script>
var charts={};

function getMetricFromRaw(entry){
    var m=entry.metric||'';
    if(m.includes('Min_ms')||m.includes('min'))return'min';
    if(m.includes('Max_ms')||m.includes('max'))return'max';
    if(m.includes('Mdev_ms')||m.includes('mdev'))return'mdev';
    if(m.includes('Avg_ms')||m.includes('avg'))return'avg';
    if(m.includes('Loss')||m.includes('loss'))return'loss';
    return null;
}

async function load(){
    try{
        var rawData=null;
        try{var r=await fetch('/api/test3-raw');rawData=await r.json();if(rawData.error)rawData=null;}catch(e){}
        
        if(!rawData||!Array.isArray(rawData)){
            var r2=await fetch('/api/test3');var d2=await r2.json();
            if(d2.error){document.body.innerHTML='<p style="color:#ef4444;padding:20px">No data available</p>';return}
            rawData=[];
            var strategies=['dualstack','dslite','nat64'];
            var prefixes=['T4_RTT_PC1_','T3_RTT_PC1_'];
            for(var run=1;run<=3;run++){
                strategies.forEach(function(s){
                    for(var p=0;p<prefixes.length;p++){
                        var prefix=prefixes[p];
                        if(d2[prefix+'Min_ms']&&d2[prefix+'Min_ms'][s]!==undefined){
                            rawData.push({strategy:s,metric:prefix+'Min_ms',run:run,value:d2[prefix+'Min_ms'][s]});
                            rawData.push({strategy:s,metric:prefix+'Avg_ms',run:run,value:d2[prefix+'Avg_ms'][s]});
                            rawData.push({strategy:s,metric:prefix+'Max_ms',run:run,value:d2[prefix+'Max_ms'][s]});
                            rawData.push({strategy:s,metric:prefix+'Mdev_ms',run:run,value:d2[prefix+'Mdev_ms'][s]});
                            rawData.push({strategy:s,metric:prefix+'Loss_Percent',run:run,value:d2[prefix+'Loss_Percent'][s]});
                            break;
                        }
                    }
                });
            }
        }
        
        // Group data
        var grouped={};
        rawData.forEach(function(entry){
            var s=entry.strategy,run=entry.run||1,metricType=getMetricFromRaw(entry),value=parseFloat(entry.value);
            if(!s||!metricType)return;
            if(!grouped[s])grouped[s]={};
            if(!grouped[s][run])grouped[s][run]={};
            grouped[s][run][metricType]=value;
        });
        
        var strategies=['dualstack','dslite','nat64'];
        var stratNames={dualstack:'Dual Stack',dslite:'DS-Lite',nat64:'NAT64'};
        var cols=['#3b82f6','#10b981','#f59e0b'];
        var stratNameClasses=['strat-name-ds','strat-name-dl','strat-name-n64'];
        var runBadges=['run-1','run-2','run-3'];
        var allRuns=new Set();
        Object.values(grouped).forEach(function(sd){Object.keys(sd).forEach(function(r){allRuns.add(parseInt(r));});});
        var runNumbers=Array.from(allRuns).sort();
        var rowsPerStrategy=runNumbers.length+1;
        
        // Chart 1: Avg RTT per run
        if(charts['rttChart'])charts['rttChart'].destroy();
        charts['rttChart']=new Chart(document.getElementById('rttChart'),{
            type:'line',
            data:{
                labels:runNumbers.map(function(r){return'Run '+r;}),
                datasets:strategies.map(function(s,i){
                    return{
                        label:stratNames[s],
                        data:runNumbers.map(function(r){return grouped[s]&&grouped[s][r]?grouped[s][r].avg||0:null;}),
                        borderColor:cols[i],backgroundColor:cols[i]+'20',
                        borderWidth:2.5,tension:0.3,fill:false,pointRadius:5,spanGaps:true
                    };
                })
            },
            options:{
                responsive:true,maintainAspectRatio:false,
                plugins:{legend:{labels:{color:'#cbd5e1',font:{size:10},padding:12,usePointStyle:true}}},
                scales:{
                    y:{beginAtZero:true,grid:{color:'rgba(255,255,255,0.06)'},title:{display:true,text:'Avg RTT (ms)',color:'#94a3b8',font:{size:9}},ticks:{color:'#94a3b8',font:{size:8}}},
                    x:{grid:{display:false},ticks:{color:'#94a3b8',font:{size:9}}}
                }
            }
        });
        
        // Chart 2: Mdev & Loss
        var avgMdev=strategies.map(function(s){
            var sum=0,cnt=0;
            runNumbers.forEach(function(r){if(grouped[s]&&grouped[s][r]&&grouped[s][r].mdev>0){sum+=grouped[s][r].mdev;cnt++;}});
            return cnt>0?sum/cnt:0;
        });
        var avgLoss=strategies.map(function(s){
            var sum=0,cnt=0;
            runNumbers.forEach(function(r){if(grouped[s]&&grouped[s][r]&&grouped[s][r].loss!==undefined){sum+=grouped[s][r].loss;cnt++;}});
            return cnt>0?sum/cnt:0;
        });
        
        if(charts['mdevChart'])charts['mdevChart'].destroy();
        charts['mdevChart']=new Chart(document.getElementById('mdevChart'),{
            type:'line',
            data:{
                labels:strategies.map(function(s){return stratNames[s];}),
                datasets:[
                    {label:'Mdev (ms)',data:avgMdev,borderColor:'#f59e0b',backgroundColor:'rgba(245,158,11,0.1)',borderWidth:2.5,tension:0.3,fill:true,pointRadius:5,yAxisID:'y'},
                    {label:'Packet Loss (%)',data:avgLoss,borderColor:'#ef4444',backgroundColor:'rgba(239,68,68,0.1)',borderWidth:2.5,tension:0.3,fill:true,pointRadius:5,borderDash:[5,3],yAxisID:'y1'}
                ]
            },
            options:{
                responsive:true,maintainAspectRatio:false,
                plugins:{legend:{labels:{color:'#cbd5e1',font:{size:10},padding:12,usePointStyle:true}}},
                scales:{
                    y:{type:'linear',position:'left',beginAtZero:true,grid:{color:'rgba(255,255,255,0.06)'},title:{display:true,text:'Mdev (ms)',color:'#f59e0b',font:{size:9}},ticks:{color:'#f59e0b',font:{size:8}}},
                    y1:{type:'linear',position:'right',beginAtZero:true,max:100,grid:{display:false},title:{display:true,text:'Loss (%)',color:'#ef4444',font:{size:9}},ticks:{color:'#ef4444',font:{size:8}}},
                    x:{grid:{display:false},ticks:{color:'#94a3b8',font:{size:9}}}
                }
            }
        });
        
        // Table
        var h='';
        strategies.forEach(function(s,si){
            if(!grouped[s])return;
            var totals={min:0,avg:0,max:0,mdev:0,loss:0},count=0,firstRow=true;
            
            runNumbers.forEach(function(run){
                var d=grouped[s][run];if(!d)return;
                h+='<tr>';
                if(firstRow){h+='<td class="strat-name '+stratNameClasses[si]+'" rowspan="'+rowsPerStrategy+'">'+stratNames[s]+'</td>';firstRow=false;}
                h+='<td><span class="run-badge '+runBadges[run-1]+'">Run '+run+'</span></td>';
                h+='<td class="'+(d.min>0?(d.min<2?'val-good':d.min<10?'val-warn':'val-bad'):'')+'">'+(d.min>0?d.min.toFixed(3):'—')+'</td>';
                h+='<td class="'+(d.avg>0?(d.avg<5?'val-good':d.avg<20?'val-warn':'val-bad'):'')+'">'+(d.avg>0?d.avg.toFixed(3):'—')+'</td>';
                h+='<td class="'+(d.max>0?(d.max<10?'val-good':d.max<50?'val-warn':'val-bad'):'')+'">'+(d.max>0?d.max.toFixed(3):'—')+'</td>';
                h+='<td class="'+(d.mdev>0?(d.mdev<1?'val-good':d.mdev<5?'val-warn':'val-bad'):'')+'">'+(d.mdev>0?d.mdev.toFixed(3):'—')+'</td>';
                h+='<td class="'+(d.loss===0?'val-good':d.loss<5?'val-warn':'val-bad')+'">'+(d.loss!==undefined?d.loss.toFixed(1)+'%':'—')+'</td>';
                h+='</tr>';
                if(d.min>0){totals.min+=d.min;totals.avg+=d.avg;totals.max+=d.max;totals.mdev+=d.mdev;totals.loss+=d.loss||0;count++;}
            });
            
            if(count>0){
                h+='<tr class="strat-avg"><td>Average</td>';
                h+='<td class="val-neutral">'+(totals.min/count).toFixed(3)+'</td>';
                h+='<td class="val-neutral">'+(totals.avg/count).toFixed(3)+'</td>';
                h+='<td class="val-neutral">'+(totals.max/count).toFixed(3)+'</td>';
                h+='<td class="val-neutral">'+(totals.mdev/count).toFixed(3)+'</td>';
                h+='<td class="val-neutral">'+(totals.loss/count).toFixed(1)+'%</td>';
                h+='</tr>';
            }
            if(si<strategies.length-1&&Object.keys(grouped).length>1)h+='<tr class="strat-separator"><td colspan="7"></td></tr>';
        });
        if(!h)h='<tr><td colspan="7" style="padding:20px">No data available</td></tr>';
        document.getElementById('summary').innerHTML=h;
        
    }catch(e){document.body.innerHTML='<p style="color:#ef4444;padding:20px">Error: '+e.message+'</p>';}
}
load();
</script>
</body>
</html>
