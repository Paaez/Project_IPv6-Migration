<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPv6 Migration Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#0f172a;color:#fff;font-family:'Segoe UI',system-ui,sans-serif;overflow:hidden;height:100vh}
        .header{background:linear-gradient(135deg,#1a2332,#0f172a);padding:0.8rem 2rem;border-bottom:1px solid #334155;display:flex;justify-content:space-between;align-items:center}
        h1{font-size:1.4rem;font-weight:700;background:linear-gradient(135deg,#38bdf8,#818cf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .subtitle{font-size:0.75rem;color:#94a3b8;margin-top:2px}
        .nav-tabs{background:#1a2332;padding:0.4rem 1.5rem 0;border-bottom:1px solid #334155;flex-wrap:nowrap;overflow-x:auto}
        .nav-tabs .nav-link{color:#94a3b8;border:none;padding:0.6rem 1.2rem;border-radius:6px 6px 0 0;margin-right:4px;font-size:0.8rem;white-space:nowrap;transition:all 0.2s}
        .nav-tabs .nav-link:hover{color:#38bdf8;background:rgba(56,189,248,0.05)}
        .nav-tabs .nav-link.active{color:#fff;background:#0f172a;border-bottom:2px solid #38bdf8;font-weight:600}
        .tab-content{height:calc(100vh - 115px)}
        .tab-pane{height:100%}
        iframe{width:100%;height:100%;border:none;background:#0f172a}
        .legend{display:flex;gap:1.2rem;align-items:center}
        .legend-item{font-size:0.75rem;display:flex;align-items:center;color:#cbd5e1;gap:6px}
        .legend-dot{width:10px;height:10px;border-radius:3px}
        .badge-fyp{background:rgba(56,189,248,0.15);color:#38bdf8;padding:0.2rem 0.6rem;border-radius:4px;font-size:0.7rem;font-weight:500}
    </style>
</head>
<body>
<div class="header">
    <div>
        <h1>IPv6 Migration Performance Dashboard</h1>
        <p class="subtitle">FYP CSP600 • Project Directory</p>
    </div>
    <div style="display:flex;align-items:center;gap:1.5rem">
        <div class="legend">
            <div class="legend-item"><span class="legend-dot" style="background:#3b82f6"></span>Dual Stack</div>
            <div class="legend-item"><span class="legend-dot" style="background:#10b981"></span>DS-Lite</div>
            <div class="legend-item"><span class="legend-dot" style="background:#f59e0b"></span>NAT64</div>
        </div>
        <span class="badge-fyp">CSP600</span>
    </div>
</div>

<ul class="nav nav-tabs" id="tabs">
    <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#pane1">📦 Packet Size</button></li>
    <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#pane2">🌐 HTTP</button></li>
    <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#pane3">🔴 RTT</button></li>
    <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#pane5">💥 Fragmentation</button></li>
    <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#paneSummary">📋 Summary</button></li>
    <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#paneAnalysis">📊 Analysis</button></li>
</ul>

<div class="tab-content">
    <div class="tab-pane fade show active" id="pane1"><iframe src="/test1"></iframe></div>
    <div class="tab-pane fade" id="pane2"><iframe src="/test2"></iframe></div>
    <div class="tab-pane fade" id="pane3"><iframe src="/test3"></iframe></div>
    <div class="tab-pane fade" id="pane5"><iframe src="/test5"></iframe></div>
    <div class="tab-pane fade" id="paneSummary"><iframe src="/summary"></iframe></div>
    <div class="tab-pane fade" id="paneAnalysis"><iframe src="/analysis"></iframe></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
