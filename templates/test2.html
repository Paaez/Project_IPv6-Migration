<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TEST 2 - HTTP</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#0f172a;color:#e2e8f0;font-family:'Segoe UI',system-ui,sans-serif;padding:20px 24px;overflow-y:auto;height:100vh}
        .card{background:#1a2332;border:1px solid #2d3a4a;border-radius:10px;overflow:hidden}
        .card-header{background:#151d2b;padding:10px 16px;font-weight:600;color:#f1f5f9;border-bottom:1px solid #2d3a4a;font-size:0.85rem;display:flex;align-items:center;gap:8px}
        .card-body{padding:16px 20px 24px 20px}
        .section-title{font-size:0.78rem;color:#38bdf8;font-weight:600;margin:0 0 10px 0;padding-left:10px;border-left:3px solid #38bdf8}
        
        .charts-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
        .chart-box{background:#151d2b;border:1px solid #2d3a4a;border-radius:8px;padding:10px}
        .chart-title{font-size:0.7rem;color:#38bdf8;margin-bottom:6px;font-weight:600}
        .chart-wrap{position:relative;height:200px}
        .chart-full{grid-column:1/-1}
        
        .table-wrapper{background:#151d2b;border:1px solid #2d3a4a;border-radius:8px;overflow:hidden;margin-top:16px}
        table{width:100%;border-collapse:collapse;font-size:0.68rem}
        th{background:#0f172a;color:#38bdf8;padding:6px 8px;text-align:left;font-weight:600;font-size:0.62rem;text-transform:uppercase;border-bottom:2px solid #2d3a4a}
        td{padding:5px 8px;border-bottom:1px solid #1e293b;color:#cbd5e1;font-size:0.63rem}
        tr:hover td{background:rgba(56,189,248,0.03)}
        .badge{background:rgba(56,189,248,0.12);color:#38bdf8;padding:2px 7px;border-radius:3px;font-size:0.6rem;font-weight:500}
        .val-good{color:#10b981;font-weight:600}
        .val-warn{color:#f59e0b;font-weight:600}
        .val-bad{color:#ef4444;font-weight:600}
        .val-neutral{color:#38bdf8;font-weight:600}
        .highlight{color:#f1f5f9;font-weight:600}
        .drop-warn{background:rgba(239,68,68,0.08)}
        .status-ok{color:#10b981}
        .status-fail{color:#ef4444}
    </style>
</head>
<body>
<div class="card">
    <div class="card-header">🌐 TEST 2: HTTP Performance <span class="badge">PC2 • T2Rs.json • Drop Detection</span></div>
    <div class="card-body">
        
        <div class="section-title">📊 HTTP Download Speed (All File Sizes)</div>
        <div class="charts-row">
            <div class="chart-box chart-full">
                <div class="chart-title">Download Speed by File Size (1KB → 1MB)</div>
                <div class="chart-wrap" style="height:240px"><canvas id="httpChart"></canvas></div>
            </div>
        </div>
        
        <div class="section-title">📋 Results Summary</div>
        <div class="table-wrapper">
            <table>
                <thead><tr><th>File Size</th><th>Dual Stack</th><th>DS-Lite</th><th>NAT64</th><th>HTTP Status</th></tr></thead>
                <tbody id="summary"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
let charts={};
function gv(d,m,s,def=0){return(d&&d[m]&&d[m][s]!==undefined)?parseFloat(d[m][s]):def}

function valClass(v,good,bad,lowerBetter=true){
    if(v===0||isNaN(v))return'';
    if(lowerBetter){if(v<=good)return'val-good';if(v>=bad)return'val-bad';return'val-warn';}
    else{if(v>=good)return'val-good';if(v<=bad)return'val-bad';return'val-warn';}
}

function dropClass(prev,curr){
    if(prev>0&&curr>0){
        const drop=((prev-curr)/prev)*100;
        if(drop>=30)return'drop-warn';
    }
    return'';
}

async function load(){
    try{
        const r=await fetch('/api/test2');const d=await r.json();
        if(d.error){document.body.innerHTML='<p style="color:#ef4444;padding:20px;text-align:center">❌ No data available</p>';return}
        
        const files=['1KB','10KB','100KB','200KB','300KB','400KB','500KB','600KB','700KB','800KB','900KB','1MB'];
        const cols=['#3b82f6','#10b981','#f59e0b'];
        const names=['Dual Stack','DS-Lite','NAT64'];
        const strats=['dualstack','dslite','nat64'];
        
        // HTTP Speed Chart
        if(charts['httpChart'])charts['httpChart'].destroy();
        charts['httpChart']=new Chart(document.getElementById('httpChart'),{type:'line',data:{labels:files,datasets:strats.map((s,i)=>({
            label:names[i],
            data:files.map(f=>gv(d,`T2_HTTP_PC2_${f}_Speed_Mbps`,s)),
            borderColor:cols[i],backgroundColor:cols[i]+'15',borderWidth:2,tension:0.4,fill:true,pointRadius:2
        }))},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#cbd5e1',font:{size:9},padding:8,usePointStyle:true}}},scales:{y:{beginAtZero:true,grid:{color:'rgba(255,255,255,0.06)'},title:{display:true,text:'Speed (Mbps)',color:'#94a3b8',font:{size:8}},ticks:{color:'#94a3b8',font:{size:7}}},x:{grid:{display:false},title:{display:true,text:'File Size',color:'#94a3b8',font:{size:8}},ticks:{color:'#94a3b8',font:{size:7},maxRotation:45}}}}});
        
        // Summary Table with Drop Detection
        let h='';
        let prevDS=null,prevDL=null,prevN64=null;
        
        files.forEach((f,i)=>{
            const ds=gv(d,`T2_HTTP_PC2_${f}_Speed_Mbps`,'dualstack');
            const dl=gv(d,`T2_HTTP_PC2_${f}_Speed_Mbps`,'dslite');
            const n64=gv(d,`T2_HTTP_PC2_${f}_Speed_Mbps`,'nat64');
            const code=gv(d,`T2_HTTP_PC2_${f}_HTTP_Code`,'dualstack',200);
            
            const dcDS=dropClass(prevDS,ds);
            const dcDL=dropClass(prevDL,dl);
            const dcN64=dropClass(prevN64,n64);
            
            h+=`<tr class="${dcDS||dcDL||dcN64}">
                <td><strong>${f}</strong></td>
                <td class="${valClass(ds,5,2,false)} ${dcDS}">${ds>0?ds.toFixed(2)+' Mbps':'—'}</td>
                <td class="${valClass(dl,5,2,false)} ${dcDL}">${dl>0?dl.toFixed(2)+' Mbps':'—'}</td>
                <td class="${valClass(n64,5,2,false)} ${dcN64}">${n64>0?n64.toFixed(2)+' Mbps':'—'}</td>
                <td class="status-ok">${code>0?code+' OK':'—'}</td>
            </tr>`;
            
            prevDS=ds;prevDL=dl;prevN64=n64;
        });
        
        // Average row
        const avgDS=files.reduce((sum,f)=>sum+gv(d,`T2_HTTP_PC2_${f}_Speed_Mbps`,'dualstack'),0)/files.length;
        const avgDL=files.reduce((sum,f)=>sum+gv(d,`T2_HTTP_PC2_${f}_Speed_Mbps`,'dslite'),0)/files.length;
        const avgN64=files.reduce((sum,f)=>sum+gv(d,`T2_HTTP_PC2_${f}_Speed_Mbps`,'nat64'),0)/files.length;
        
        h+=`<tr style="border-top:3px solid #38bdf8;font-weight:700">
            <td>📊 Average</td>
            <td class="val-neutral">${avgDS.toFixed(2)} Mbps</td>
            <td class="val-neutral">${avgDL.toFixed(2)} Mbps</td>
            <td class="val-neutral">${avgN64.toFixed(2)} Mbps</td>
            <td class="val-neutral">—</td>
        </tr>`;
        
        document.getElementById('summary').innerHTML=h;
        
    }catch(e){document.body.innerHTML='<p style="color:#ef4444;padding:20px;text-align:center">❌ Error loading data</p>';console.error(e);}
}
load();
</script>
</body>
</html>
